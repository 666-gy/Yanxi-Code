<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 主渐变：蓝色到青色 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- 左侧渐变 -->
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- 右侧渐变 -->
    <linearGradient id="rightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 强发光 -->
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Y形主体 - 带发光 -->
  <g filter="url(#strongGlow)">
    <!-- Y左支 - 代表代码/输入 -->
    <path d="M 100 100 L 216 240 L 256 240 L 152 112 Z"
          fill="url(#leftGrad)" opacity="0.95"/>

    <!-- Y右支 - 代表翻译/输出 -->
    <path d="M 412 100 L 296 240 L 256 240 L 360 112 Z"
          fill="url(#rightGrad)" opacity="0.95"/>

    <!-- Y中干 - 代表理解/融合 -->
    <path d="M 228 240 L 284 240 L 272 400 L 240 400 Z"
          fill="url(#mainGrad)" opacity="0.95"/>
  </g>

  <!-- 高光边缘 -->
  <path d="M 100 100 L 216 240 L 256 240 L 152 112 Z"
        fill="none" stroke="#A5B4FC" stroke-width="2" opacity="0.5"/>
  <path d="M 412 100 L 296 240 L 256 240 L 360 112 Z"
        fill="none" stroke="#67E8F9" stroke-width="2" opacity="0.5"/>
  <path d="M 228 240 L 284 240 L 272 400 L 240 400 Z"
        fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0.4"/>

  <!-- 代码符号 - 左侧 < >  -->
  <g filter="url(#softGlow)" opacity="0.9">
    <text x="120" y="180" font-family="Consolas, monospace" font-size="48" font-weight="700" fill="#818CF8">&lt;</text>
  </g>

  <!-- 翻译符号 - 右侧 文/字 -->
  <g filter="url(#softGlow)" opacity="0.9">
    <text x="360" y="180" font-family="Consolas, monospace" font-size="48" font-weight="700" fill="#22D3EE">&gt;</text>
  </g>

  <!-- 中心交汇点 - 顿悟光点 -->
  <circle cx="256" cy="252" r="10" fill="#F0ABFC" filter="url(#softGlow)"/>
  <circle cx="256" cy="252" r="5" fill="#FFFFFF"/>

  <!-- 连接线 - 底部暗示代码行 -->
  <g opacity="0.5" stroke="#8B5CF6" stroke-linecap="round">
    <line x1="180" y1="420" x2="332" y2="420" stroke-width="3"/>
    <line x1="200" y1="440" x2="300" y2="440" stroke-width="2" opacity="0.6"/>
    <line x1="220" y1="458" x2="280" y2="458" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
